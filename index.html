<div class="invoice" v-if="invoice">

<div class="top">
<div class="block">
<div class="header">
<div class="meta title">ANNEX A – EQUIPMENT ISSUANCE</div>
</div>
</div>
</div>

<div class="client">
<div class="title">NAME</div>
<div class="details">
{{ invoice["Full Name"] }}
</div>
</div>

<table class="items">

<tr>
<th>Description</th>
<th>Brand</th>
<th>Model</th>
<th>Serial</th>
<th>Assigned Date</th>
</tr>

<tr v-for="item in invoice.Items">
<td>{{ item.Description }}</td>
<td>{{ item.Brand }}</td>
<td>{{ item.Model }}</td>
<td>{{ item.Serial }}</td>
<td>{{ moment(item["Assigned date"]).format("MMM DD, YYYY") }}</td>
</tr>

<tr v-if="!invoice.Items.length">
<td colspan="5">No assigned equipment</td>
</tr>

</table>

</div>
